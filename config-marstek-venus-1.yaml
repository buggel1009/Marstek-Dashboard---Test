# Marstek Venus Dashboard — Funktionierende Konfiguration
# Getestet mit:
#   - marstek_venus_modbus (ViperRNMC) → deutsche Entitätsnamen
#   - marstek_venus_energy_manager (ffunes) → englische Schlüssel
#   - Solar-Inverter: 60m2801045yl014 (MPPT-Daten)
#
# HINWEIS: Karte per YAML einfügen (Lovelace → Karte hinzufügen → YAML-Editor)

type: custom:marstek-venus-dashboard
title: Marstek Venus
entity_prefix: ""
entities:

  # ── Batterie (marstek_venus_modbus) ────────────────────────────────────
  battery_soc:             sensor.marstek_venus_modbus_batterie_ladezustand
  battery_power:           sensor.marstek_venus_modbus_batterieleistung
  battery_voltage:         sensor.marstek_venus_modbus_batteriespannung
  battery_current:         sensor.marstek_venus_modbus_batteriestrom
  battery_total_energy:    sensor.marstek_venus_modbus_batterie_gesamtenergie
  inverter_state:          sensor.marstek_venus_modbus_wechselrichter_status

  # ── Temperaturen (marstek_venus_modbus) ────────────────────────────────
  internal_temperature:    sensor.marstek_venus_modbus_innentemperatur
  internal_mos1_temperature: sensor.marstek_venus_modbus_interne_mos1_temperatur
  internal_mos2_temperature: sensor.marstek_venus_modbus_interne_mos2_temperatur
  max_cell_temperature:    sensor.marstek_venus_modbus_maximale_zellentemperatur
  min_cell_temperature:    sensor.marstek_venus_modbus_minimale_zellentemperatur

  # ── Zellspannungen (marstek_venus_modbus) ──────────────────────────────
  max_cell_voltage:        sensor.marstek_venus_modbus_maximale_zellenspannung
  min_cell_voltage:        sensor.marstek_venus_modbus_minimale_zellenspannung

  # ── AC-Netz (marstek_venus_modbus) ─────────────────────────────────────
  ac_power:                sensor.marstek_venus_modbus_ac_leistung
  ac_voltage:              sensor.marstek_venus_modbus_ac_spannung
  ac_current:              sensor.marstek_venus_modbus_ac_strom
  ac_frequency:            sensor.marstek_venus_modbus_ac_frequenz
  ac_offgrid_power:        sensor.marstek_venus_modbus_ac_offgrid_leistung
  ac_offgrid_voltage:      sensor.marstek_venus_modbus_ac_offgrid_spannung
  ac_offgrid_current:      sensor.marstek_venus_modbus_ac_offgrid_strom

  # ── Solar / MPPT (Solar-Inverter) ──────────────────────────────────────
  mppt1_power:             sensor.60m2801045yl014_pv1_power
  mppt2_power:             sensor.60m2801045yl014_pv2_power

  # ── Energie täglich (marstek_venus_modbus) ─────────────────────────────
  total_daily_charging_energy:    sensor.marstek_venus_modbus_tagliche_ladeenergie
  total_daily_discharging_energy: sensor.marstek_venus_modbus_tagliche_entladeenergie

  # ── Energie monatlich (marstek_venus_modbus) ───────────────────────────
  total_monthly_charging_energy:    sensor.marstek_venus_modbus_monatliche_ladeenergie
  total_monthly_discharging_energy: sensor.marstek_venus_modbus_monatliche_entladeenergie

  # ── Energie gesamt (gemischt) ──────────────────────────────────────────
  total_charging_energy:   sensor.marstek_venus_1_gesamte_ladeenergie
  total_discharging_energy: sensor.marstek_venus_modbus_gesamte_entladeenergie
  stored_energy:           sensor.marstek_venus_modbus_gespeicherte_energie

  # ── Effizienz & Zyklen (gemischt) ──────────────────────────────────────
  battery_cycle_count_calc: sensor.marstek_venus_modbus_vollzyklen_berechnet
  battery_cycle_count:     sensor.marstek_venus_1_batteriezyklen_berechnet
  round_trip_efficiency_total: sensor.marstek_venus_1_gesamtwirkungsgrad
  round_trip_efficiency_monthly: sensor.marstek_venus_modbus_monatliche_roundtrip_effizienz
  conversion_efficiency:   sensor.marstek_venus_modbus_umwandlungseffizienz

  # ── Zell-Balance (ffunes: marstek_venus_1) ─────────────────────────────
  balance_status:          sensor.marstek_venus_1_balance_status
  balance_trend:           sensor.marstek_venus_1_balance_trend
  balance_last_measurement: sensor.marstek_venus_1_balance_letzte_messung
  balance_delta_avg:       sensor.marstek_venus_1_balance_delta_durchschnitt_4_messungen
  balance_cell_delta_100:  sensor.marstek_venus_1_balance_zellendelta_bei_100  # ggf. anpassen

  # ── Alarm (marstek_venus_modbus) ───────────────────────────────────────
  fault_status:            sensor.marstek_venus_modbus_fehlerstatus
  alarm_status:            sensor.marstek_venus_modbus_alarmstatus

  # ── Konnektivität (marstek_venus_modbus) ───────────────────────────────
  wifi_status:             binary_sensor.marstek_venus_modbus_wlan_status
  cloud_status:            binary_sensor.marstek_venus_modbus_cloud_status
  wifi_signal_strength:    sensor.marstek_venus_modbus_wlan_signalstarke

  # ── Steuerung (gemischt) ───────────────────────────────────────────────
  force_mode:              select.marstek_venus_1_betriebsmodus_erzwingen
  user_work_mode:          select.marstek_venus_1_arbeitsmodus
  set_charge_power:        number.marstek_venus_modbus_ladeleistung_einstellen
  set_discharge_power:     number.marstek_venus_modbus_entladeleistung_einstellen

  # ── SOC-Grenzen (ffunes: marstek_venus_1) ──────────────────────────────
  charging_cutoff_capacity:   number.marstek_venus_1_lade_soc_grenzwert
  discharging_cutoff_capacity: number.marstek_venus_1_entlade_soc_grenzwert
  charge_to_soc:           number.marstek_venus_system_ladungsverzogerung_soc_schwellwert

  # ── Schalter (ffunes: marstek_venus_1) ─────────────────────────────────
  active_balance_mode:     switch.marstek_venus_1_aktiver_zellabgleich
  battery_allow_charge:    switch.marstek_venus_1_laden_erlauben       # bitte prüfen
  battery_allow_discharge: switch.marstek_venus_1_entladen_erlauben

show_controls: true
show_health: true
show_energy_stats: true
show_ac: true
